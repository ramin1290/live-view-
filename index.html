<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>html,body,#map{height:100%;margin:0}</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([23.8,90.4],7);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    attribution:'© Esri'
  }).addTo(map);
  const marker = L.marker([23.8,90.4]).addTo(map);

  async function fetchData(){
    try{
      const r = await fetch('https://api.thingspeak.com/channels/991037/feeds/last.json');
      const d = await r.json();
      const lat = parseFloat(d.field1), lon = parseFloat(d.field2);
      if(!isNaN(lat) && !isNaN(lon)){
        marker.setLatLng([lat,lon]);
        map.setView([lat,lon]);
      }
    }catch(e){console.error(e)}
  }
  fetchData();
  setInterval(fetchData,15000);
</script>
</body>
</html>
