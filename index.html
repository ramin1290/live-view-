<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>#map { height: 100vh; margin:0; }</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([23.8, 90.4], 7);
  // Satellite tiles
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
  }).addTo(map);
  // Labels overlay (optional)
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri'
  }).addTo(map);

  const marker = L.marker([23.8, 90.4]).addTo(map);

  async function fetchData() {
    try {
      const r = await fetch('https://api.thingspeak.com/channels/991037/fields/1/last.json');
      const d = await r.json();
      const lat = parseFloat(d.field1);
      const lon = parseFloat(d.field2); // field2 তোমার চ্যানেলে থাকলে
      if (!isNaN(lat) && !isNaN(lon)) {
        marker.setLatLng([lat, lon]);
        map.setView([lat, lon]);
      }
    } catch(e) { console.error(e); }
  }

  fetchData();
  setInterval(fetchData, 15000); // 15 সেকেন্ড
</script>
</body>
</html>
